<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chrome Required</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .main-content {
    text-align: center;
    max-width: 600px;
    opacity: 0.3;
    filter: blur(2px);
    pointer-events: none;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease;
  }
  .modal {
    background: #fff;
    color: #1a1a2e;
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal .logo {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    background: conic-gradient(
      from 0deg,
      #ea4335 0deg 90deg,
      #fbbc04 90deg 180deg,
      #34a853 180deg 270deg,
      #4285f4 270deg 360deg
    );
    border-radius: 50%;
    position: relative;
  }
  .modal .logo::after {
    content: "";
    position: absolute;
    inset: 18px;
    background: #fff;
    border-radius: 50%;
    border: 8px solid #4285f4;
  }
  .modal h1 {
    font-size: 24px;
    margin-bottom: 12px;
    font-weight: 700;
  }
  .modal p {
    font-size: 15px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .detected {
    background: #fff3cd;
    color: #856404;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    border: 1px solid #ffeaa7;
  }
  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #4285f4, #34a853);
    color: #fff;
    padding: 14px 32px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    width: 100%;
    margin-bottom: 10px;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(66, 133, 244, 0.4);
  }
  .secondary-btn {
    display: block;
    margin: 10px auto;
    color: #666;
    font-size: 14px;
    text-decoration: underline;
    background: none;
    border: none;
    cursor: pointer;
  }
  .copy-btn {
    background: #f0f0f0;
    color: #333;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="main-content">
  <h1>🔒 Protected Content</h1>
  <p>This page requires Google Chrome to be viewed properly.</p>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="logo" aria-hidden="true"></div>
    <h1>Chrome Required</h1>
    <p>This experience is optimized for <strong>Google Chrome</strong>. Please open this page in Chrome to continue.</p>
    <div class="detected" id="detectedBrowser"></div>
    <button class="cta-btn" id="openChromeBtn">Open in Chrome</button>
    <button class="cta-btn copy-btn" id="copyLinkBtn">Copy Link</button>
    <button class="secondary-btn" id="downloadBtn">Download Chrome</button>
  </div>
</div>

<script>
  // ---- Browser detection ----
  function detectBrowser() {
    const ua = navigator.userAgent;
    const vendor = navigator.vendor || "";

    if (/Edg\//.test(ua))      return { name: "Microsoft Edge", isChrome: false };
    if (/OPR\//.test(ua) || /Opera/.test(ua)) return { name: "Opera", isChrome: false };
    if (/Brave/.test(ua))      return { name: "Brave", isChrome: false };
    if (/Vivaldi/.test(ua))    return { name: "Vivaldi", isChrome: false };
    if (/YaBrowser/.test(ua))  return { name: "Yandex Browser", isChrome: false };
    if (/SamsungBrowser/.test(ua)) return { name: "Samsung Internet", isChrome: false };
    if (/UCBrowser/.test(ua))  return { name: "UC Browser", isChrome: false };
    if (/Firefox/.test(ua))    return { name: "Firefox", isChrome: false };
    if (/Safari/.test(ua) && /Apple/.test(vendor) && !/Chrome/.test(ua))
      return { name: "Safari", isChrome: false };

    if (/Chrome/.test(ua) && /Google Inc/.test(vendor))
      return { name: "Google Chrome", isChrome: true };

    return { name: "Unknown browser", isChrome: false };
  }

  // ---- Main logic ----
  const browser = detectBrowser();
  const currentUrl = window.location.href;
  
  document.getElementById("detectedBrowser").textContent = `Detected: ${browser.name}`;

  const openChromeBtn = document.getElementById("openChromeBtn");
  const copyLinkBtn = document.getElementById("copyLinkBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  
  const ua = navigator.userAgent;
  const isAndroid = /Android/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);

  if (isAndroid) {
    // Android: Use proper intent URL with fallback
    openChromeBtn.textContent = "Open in Chrome App";
    openChromeBtn.onclick = () => {
      const urlWithoutProtocol = currentUrl.replace(/^https?:\/\//, '');
      // Proper Android intent URL
      const intentUrl = `intent://navigate/${encodeURIComponent(currentUrl)}#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent('https://play.google.com/store/apps/details?id=com.android.chrome')};end`;
      window.location.href = intentUrl;
    };
    downloadBtn.onclick = () => {
      window.location.href = "https://play.google.com/store/apps/details?id=com.android.chrome";
    };
  } else if (isIOS) {
    // iOS: Use Chrome custom scheme
    openChromeBtn.textContent = "Open in Chrome App";
    openChromeBtn.onclick = () => {
      const urlWithoutProtocol = currentUrl.replace(/^https?:\/\//, '');
      window.location.href = `googlechrome://${urlWithoutProtocol}`;
    };
    downloadBtn.onclick = () => {
      window.location.href = "https://apps.apple.com/app/google-chrome/id535886823";
    };
  } else {
    // Desktop: Just show copy link option
    openChromeBtn.style.display = "none";
    copyLinkBtn.textContent = "Copy Link & Open Chrome Manually";
    copyLinkBtn.onclick = () => {
      navigator.clipboard?.writeText(currentUrl).then(() => {
        copyLinkBtn.textContent = "✓ Link copied! Now paste in Chrome";
        setTimeout(() => {
          copyLinkBtn.textContent = "Copy Link & Open Chrome Manually";
        }, 3000);
      }).catch(() => {
        // Fallback for older browsers
        const textarea = document.createElement("textarea");
        textarea.value = currentUrl;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        copyLinkBtn.textContent = "✓ Link copied! Now paste in Chrome";
        setTimeout(() => {
          copyLinkBtn.textContent = "Copy Link & Open Chrome Manually";
        }, 3000);
      });
    };
    downloadBtn.onclick = () => {
      window.open("https://www.google.com/chrome/", "_blank");
    };
  }

  if (!browser.isChrome) {
    document.getElementById("modal").style.display = "flex";
    document.body.style.overflow = "hidden";
  }
</script>

</body>
</html>
