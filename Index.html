<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chrome Required</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .main-content {
    text-align: center;
    max-width: 600px;
    opacity: 0.3;
    filter: blur(2px);
    pointer-events: none;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease;
  }
  .modal {
    background: #fff;
    color: #1a1a2e;
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal .logo {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    background: conic-gradient(
      from 0deg,
      #ea4335 0deg 90deg,
      #fbbc04 90deg 180deg,
      #34a853 180deg 270deg,
      #4285f4 270deg 360deg
    );
    border-radius: 50%;
    position: relative;
  }
  .modal .logo::after {
    content: "";
    position: absolute;
    inset: 18px;
    background: #fff;
    border-radius: 50%;
    border: 8px solid #4285f4;
  }
  .modal h1 {
    font-size: 24px;
    margin-bottom: 12px;
    font-weight: 700;
  }
  .modal p {
    font-size: 15px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .detected {
    background: #fff3cd;
    color: #856404;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    border: 1px solid #ffeaa7;
  }
  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #4285f4, #34a853);
    color: #fff;
    padding: 14px 32px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(66, 133, 244, 0.4);
  }
  .secondary-btn {
    display: block;
    margin-top: 12px;
    color: #666;
    font-size: 13px;
    text-decoration: underline;
    background: none;
    border: none;
    cursor: pointer;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="main-content">
  <h1>🔒 Protected Content</h1>
  <p>This page requires Google Chrome to be viewed properly.</p>
</div>

<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="logo" aria-hidden="true"></div>
    <h1>Chrome Required</h1>
    <p>This experience is optimized for <strong>Google Chrome</strong>. Please open this page in Chrome to continue.</p>
    <div class="detected" id="detectedBrowser"></div>
    <a href="#" class="cta-btn" id="ctaBtn">Open in Chrome</a>
    <button class="secondary-btn" id="downloadBtn">Download Chrome</button>
  </div>
</div>

<script>
  // ---- Browser detection ----
  function detectBrowser() {
    const ua = navigator.userAgent;
    const vendor = navigator.vendor || "";

    // Order matters: check Chromium-based impostors BEFORE Chrome
    if (/Edg\//.test(ua))      return { name: "Microsoft Edge", isChrome: false };
    if (/OPR\//.test(ua) || /Opera/.test(ua)) return { name: "Opera", isChrome: false };
    if (/Brave/.test(ua))      return { name: "Brave", isChrome: false };
    if (/Vivaldi/.test(ua))    return { name: "Vivaldi", isChrome: false };
    if (/YaBrowser/.test(ua))  return { name: "Yandex Browser", isChrome: false };
    if (/SamsungBrowser/.test(ua)) return { name: "Samsung Internet", isChrome: false };
    if (/UCBrowser/.test(ua))  return { name: "UC Browser", isChrome: false };
    if (/Firefox/.test(ua))    return { name: "Firefox", isChrome: false };
    if (/Safari/.test(ua) && /Apple/.test(vendor) && !/Chrome/.test(ua))
      return { name: "Safari", isChrome: false };

    // Actual Chrome
    if (/Chrome/.test(ua) && /Google Inc/.test(vendor))
      return { name: "Google Chrome", isChrome: true };

    return { name: "Unknown browser", isChrome: false };
  }

  // ---- Build platform-specific CTA ----
  function buildCTA() {
    const ua = navigator.userAgent;
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const currentUrl = window.location.href;

    const ctaBtn = document.getElementById("ctaBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    if (isAndroid) {
      // Android Intent URL: launches Chrome directly if installed
      const encoded = encodeURIComponent(currentUrl);
      ctaBtn.href = `intent://navigate/${encoded}#Intent;scheme=https;action=android.intent.action.VIEW;package=com.android.chrome;end`;
      ctaBtn.textContent = "Open in Chrome";
      downloadBtn.href = "https://play.google.com/store/apps/details?id=com.android.chrome";
    } else if (isIOS) {
      // iOS: use Google Chrome's custom scheme, fallback to App Store
      ctaBtn.href = `googlechrome://navigate?url=${encodeURIComponent(currentUrl)}`;
      ctaBtn.textContent = "Open in Chrome App";
      downloadBtn.href = "https://apps.apple.com/app/google-chrome/id535886823";
    } else {
      // Desktop: can't auto-launch, so offer download + instructions
      ctaBtn.href = "#";
      ctaBtn.textContent = "Copy Link & Open Chrome";
      ctaBtn.onclick = (e) => {
        e.preventDefault();
        navigator.clipboard?.writeText(currentUrl);
        ctaBtn.textContent = "✓ Link copied — paste it in Chrome";
        setTimeout(() => { ctaBtn.textContent = "Copy Link & Open Chrome"; }, 2500);
      };
      downloadBtn.href = "https://www.google.com/chrome/";
    }
  }

  // ---- Main ----
  const browser = detectBrowser();
  document.getElementById("detectedBrowser").textContent =
    `We detected you're using: ${browser.name}`;

  if (!browser.isChrome) {
    buildCTA();
    document.getElementById("modal").style.display = "flex";
    document.body.style.overflow = "hidden";
  }
</script>

</body>
</html>
